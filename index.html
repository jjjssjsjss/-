                    { id: "w11-d3", name: "수요일 (53일차)", title: "제6회 모의고사 풀이 & 최종 실전 감각 극대화", topics: ["마지막 난이도 상 모의고사 완수", "실제 CBT 컴퓨터 마킹 화면을 연상하며 연습", "오답은 무조건 해설 속독"], completed: false, notes: "" },
                    { id: "w11-d4", name: "목요일 (54일차)", title: "핵심 공식 최종 리마인드 (D-2)", topics: ["핵심공식 전체 독파", "KEC 가공전선 이격거리 최종 머릿속 스케치", "과년도 오답 포스트잇 최종 회독"], completed: false, notes: "" },

        function App() {
            // 상태 정의
            const [weeks, setWeeks] = useState(() => {
                return INITIAL_WEEKS_DATA;
            });
            const [selectedPhase, setSelectedPhase] = useState("all"); // 'all', '1', '2', '3'
            const [selectedWeek, setSelectedWeek] = useState(1);
            const [selectedDayId, setSelectedDayId] = useState("w1-d1");
            const [activeTab, setActiveTab] = useState("tracker"); // 'tracker', 'scratchpad'
            const [scratchpadText, setScratchpadText] = useState("");
            
            // 토스트 알림 메시지 상태 (alert 대체용)
            const [toast, setToast] = useState({ show: false, message: "", type: "info" });

            // 8월 8일 시험 디데이 계산 (2026-05-24 기준)
            const dDayText = useMemo(() => {
                const examDate = new Date("2026-08-08T00:00:00");
                const currentDate = new Date("2026-05-24T14:50:00"); 
                const diffTime = examDate - currentDate;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                return diffDays > 0 ? `D-${diffDays}` : diffDays === 0 ? "D-Day! 화이팅!" : `시험 종료`;
            }, []);

            // 토스트 알림 트리거 함수
            const showToast = (message, type = "info") => {
                setToast({ show: true, message, type });
                setTimeout(() => {
                    setToast({ show: false, message: "", type: "info" });
                }, 3000);
            };

            // 진도 저장하기 (JSON 다운로드)
            const exportProgress = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(weeks, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `전기기사_11주_진도표_${new Date().toISOString().slice(0,10)}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
                showToast("현재 학습 진도가 성공적으로 백업용 파일로 저장되었습니다.", "success");
            };

            // 진도 불러오기 (JSON 업로드)
            const handleImportProgress = (event) => {
                const fileReader = new FileReader();
                fileReader.readAsText(event.target.files[0], "UTF-8");
                fileReader.onload = (e) => {
                    try {
                        const parsedData = JSON.parse(e.target.result);
                        if (Array.isArray(parsedData) && parsedData.length > 0 && parsedData[0].hasOwnProperty('days')) {
                            setWeeks(parsedData);
                            // 첫번째 주 및 일차로 초기 선택
                            setSelectedWeek(parsedData[0].id);
                            setSelectedDayId(parsedData[0].days[0].id);
                            showToast("공부 진행도가 성공적으로 로드되었습니다!", "success");
                        } else {
                            showToast("올바르지 않은 형식의 백업 파일입니다.", "error");
                        }
                    } catch (error) {
                        showToast("파일 분석에 실패했습니다.", "error");
                    }
                };
            };

            // 전체 완료도 계산
            const progressStats = useMemo(() => {
                let totalTasks = 0;
                let completedTasks = 0;
                weeks.forEach(w => {
                    w.days.forEach(d => {
                        totalTasks++;
                        if (d.completed) completedTasks++;
                    });
                });
                const percentage = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;
                return { total: totalTasks, completed: completedTasks, percent: percentage };
            }, [weeks]);

            // 단계별 완료도
            const phaseStats = useMemo(() => {
                const stats = { 1: { t: 0, c: 0 }, 2: { t: 0, c: 0 }, 3: { t: 0, c: 0 } };
                weeks.forEach(w => {
                    w.days.forEach(d => {
                        stats[w.phase].t++;
                        if (d.completed) stats[w.phase].c++;
                    });
                });
                return stats;
            }, [weeks]);

            // 특정 일차 선택 핸들러
            const handleSelectDay = (weekId, dayId) => {
                setSelectedWeek(weekId);
                setSelectedDayId(dayId);
            };

            // 특정 일차 토글 완료 핸들러
            const toggleDayCompleted = (weekId, dayId) => {
                setWeeks(prevWeeks => {
                    return prevWeeks.map(w => {
                        if (w.id === weekId) {
                            return {
                                ...w,
                                days: w.days.map(d => {
                                    if (d.id === dayId) {
                                        const nextState = !d.completed;
                                        if (nextState) {
                                            showToast(`${d.name} 학습 완료 완료! 💪`, "success");
                                        }
                                        return { ...d, completed: nextState };
                                    }
                                    return d;
                                })
                            };
                        }
                        return w;
                    });
                });
            };

            // 특정 일차 메모 저장
            const handleSaveDayNotes = (weekId, dayId, noteText) => {
                setWeeks(prevWeeks => {
                    return prevWeeks.map(w => {
                        if (w.id === weekId) {
                            return {
                                ...w,
                                days: w.days.map(d => {
                                    if (d.id === dayId) {
                                        return { ...d, notes: noteText };
                                    }
                                    return d;
                                })
                            };
                        }
                        return w;
                    });
                });
            };

            // 현재 선택된 일차 데이터
            const currentSelectedDay = useMemo(() => {
                const currentWeek = weeks.find(w => w.id === selectedWeek);
                if (currentWeek) {
                    return currentWeek.days.find(d => d.id === selectedDayId);
                }
                return null;
            }, [weeks, selectedWeek, selectedDayId]);

            return (
                <div class="flex-grow flex flex-col md:flex-row h-screen overflow-hidden text-slate-100 relative">

                            <span class="mr-2">
                                {toast.type === 'success' ? '✅' : toast.type === 'error' ? '❌' : 'ℹ️'}
                            </span>
                            {toast.message}
                        </div>

                    {/* Left Sidebar: Progress Dashboard & Navigation */}

                        {/* Profile/D-Day Area */}
                        <div class="p-6 border-b border-slate-800 bg-gradient-to-br from-slate-900 to-indigo-950/40">

                                <span class="bg-amber-500/20 text-amber-400 font-bold px-3 py-1 rounded-full text-xs">{dDayText}</span>
                            </div>
                            <h1 class="text-xl font-bold text-slate-50 tracking-tight">전기기사 11주 합격 트래커</h1>
                            <p class="text-xs text-slate-400 mt-1">시험일: 2026.08.08 (토)</p>
                            
                            {/* Total Progress */}
                            <div class="mt-6">
                                <div class="flex justify-between text-xs text-slate-400 mb-1">
                                    <span>전체 진도 완료율</span>
                                    <span class="font-bold text-indigo-400">{progressStats.percent}%</span>
                                </div>
                                <div class="w-full bg-slate-800 rounded-full h-2.5 overflow-hidden">
                                    <div class="bg-gradient-to-r from-indigo-500 to-cyan-400 h-2.5 rounded-full transition-all duration-500" style={{ width: `${progressStats.percent}%` }}></div>
                                </div>
                                <div class="flex justify-between text-[10px] text-slate-500 mt-1">
                                    <span>총 {progressStats.total}일 중</span>
                                    <span>{progressStats.completed}일 완료</span>
                                </div>
                            </div>
                        </div>

                        {/* App Tabs (2개 탭으로 정돈) */}
                        <div class="grid grid-cols-2 border-b border-slate-800 text-xs text-center font-medium bg-slate-900/50">
                            <button 
                                onClick={() => setActiveTab("tracker")} 
                                class={`py-3 transition ${activeTab === 'tracker' ? 'border-b-2 border-indigo-500 text-indigo-400 bg-slate-800/40' : 'text-slate-400 hover:text-slate-300'}`}
                            >
                                <i class="fa-solid fa-calendar-check mr-1"></i>계획표

                        {/* Sidebar Dynamic Content based on Tab */}

                                            <button

                                                class={`py-1.5 px-1 rounded text-center transition ${selectedPhase === '3' ? 'bg-indigo-600 text-white font-bold' : 'bg-slate-800 text-slate-400 hover:bg-slate-750'}`}
                                            >3단계</button>
                                        </div>
                                    </div>

                                        </div>
                                    </div>

                                    {/* Phase Progress Card */}

                                            <span class="font-bold text-slate-200">{Math.round((phaseStats[1].c / (phaseStats[1].t || 1)) * 100)}% ({phaseStats[1].c}/{phaseStats[1].t})</span>

                                            <span>📙 2단계 타우(τ) 유형집</span>
                                            <span class="font-bold text-slate-200">{Math.round((phaseStats[2].c / (phaseStats[2].t || 1)) * 100)}% ({phaseStats[2].c}/{phaseStats[2].t})</span>
                                        </div>
                                        <div class="p-2.5 bg-slate-800/30 rounded-lg flex justify-between items-center">
                                            <span>📝 3단계 최종 모의고사</span>
                                            <span class="font-bold text-slate-200">{Math.round((phaseStats[3].c / (phaseStats[3].t || 1)) * 100)}% ({phaseStats[3].c}/{phaseStats[3].t})</span>
                                        </div>
                                    </div>

                                    {/* 3중 복습 가이드 퀵 링크 */}
                                    <div class="bg-indigo-950/20 border border-indigo-900/50 p-3 rounded-lg text-xs">
                                        <h3 class="font-bold text-indigo-400 mb-1"><i class="fa-solid fa-rotate-right mr-1"></i>3중 누적 복습법 핵심 가이드</h3>
                                        <ul class="space-y-1.5 text-slate-400 text-[11px] list-disc list-inside">
                                            <li><b class="text-slate-300">매일 아침 10분:</b> 전날 진도 눈도장</li>
                                            <li><b class="text-slate-300">금요일 리뷰데이:</b> 새로운 진도 없이 이번 주 분량 전체 가볍게 형광펜 정독</li>
                                            <li><b class="text-slate-300">타우 역방향 매칭:</b> 문제집을 풀며 기억 안 나는 개념은 기본서로 연동</li>
                                        </ul>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'scratchpad' && (
                                <div class="space-y-3">
                                    <label class="text-[11px] uppercase font-bold text-slate-400 tracking-wider">종합 학습 메모장</label>
                                    <p class="text-[11px] text-slate-500">눈으로 요점 공부하면서 꼭 기억해야 하는 식이나 중요 암기 수치를 편하게 낙서해 두세요.</p>
                                    <textarea 
                                        value={scratchpadText}
                                        onChange={(e) => setScratchpadText(e.target.value)}
                                        placeholder="예: RLC 직렬 임피던스 합성식, 동기발전기 병렬 운전 조건 (기주파위) 등 언제나 빠르게 볼 수 있도록 메모하세요..."
                                        class="w-full h-96 bg-slate-800/50 border border-slate-700 rounded-lg p-3 text-xs text-slate-100 focus:outline-none focus:border-indigo-500 font-mono resize-none"
                                    ></textarea>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Right Area: Interactive Plan Checklists */}
                    <div class="flex-grow flex flex-col md:flex-row overflow-hidden bg-slate-950">
                        
                        {/* Center: List of Weeks & Days */}
                        <div class="flex-1 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col h-full overflow-hidden">
                            
                            {/* Filtered Weekly List */}
                            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/40">
                                <h2 class="text-sm font-bold text-slate-200"><i class="fa-regular fa-calendar-days mr-1.5"></i>전기기사 11주 정밀 코스웨어</h2>
                                <span class="text-xs text-slate-400">주차별 펼쳐서 선택하세요</span>
                            </div>

                            <div class="flex-grow overflow-y-auto p-4 space-y-3 custom-scrollbar">
                                {weeks
                                    .filter(w => selectedPhase === "all" || w.phase.toString() === selectedPhase)
                                    .map((week) => {
                                        // 주차별 완료율 계산
                                        const weekCompleted = week.days.filter(d => d.completed).length;
                                        const weekTotal = week.days.length;
                                        const weekPercent = Math.round((weekCompleted / weekTotal) * 100);

                                        return (
                                            <div 
                                                key={week.id} 
                                                class={`rounded-xl border transition duration-300 overflow-hidden ${selectedWeek === week.id ? 'border-indigo-500 bg-slate-900/60' : 'border-slate-800 bg-slate-900/20'}`}
                                            >
                                                {/* Week Header Toggle Card */}
                                                <div 
                                                    onClick={() => {
                                                        setSelectedWeek(week.id);
                                                        setSelectedDayId(week.days[0].id);
                                                    }}
                                                    class="p-4 flex justify-between items-center cursor-pointer hover:bg-slate-900/40 select-none"
                                                >
                                                    <div class="flex-1 pr-4">
                                                        <div class="flex items-center gap-2 mb-1">
                                                            <span class="text-[10px] uppercase font-bold text-indigo-400 bg-indigo-500/10 px-2 py-0.5 rounded">{week.phaseName}</span>
                                                            <span class="text-[10px] text-slate-500">{week.range}</span>
                                                        </div>
                                                        <h3 class="font-bold text-sm text-slate-200">{week.weekTitle}</h3>
                                                    </div>
                                                    
                                                    {/* Progress circle equivalent */}
                                                    <div class="flex items-center gap-3">
                                                        <div class="text-right">
                                                            <div class="text-[11px] font-bold text-indigo-400">{weekPercent}%</div>
                                                            <div class="text-[9px] text-slate-500">{weekCompleted}/{weekTotal}일 완료</div>
                                                        </div>
                                                        <div class="w-2 h-10 bg-slate-800 rounded-full overflow-hidden">
                                                            <div class="bg-indigo-500 rounded-full transition-all duration-300" style={{ height: `${weekPercent}%` }}></div>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* Week days inside when active */}
                                                {selectedWeek === week.id && (
                                                    <div class="border-t border-slate-800/80 bg-slate-950/30 p-2 space-y-1.5">
                                                        {week.days.map((day) => (
                                                            <div 
                                                                key={day.id}
                                                                onClick={() => handleSelectDay(week.id, day.id)}
                                                                class={`p-3 rounded-lg flex items-center justify-between cursor-pointer transition ${selectedDayId === day.id ? 'bg-indigo-950/40 border border-indigo-500/40 text-slate-100' : 'hover:bg-slate-900/30 text-slate-400'}`}
                                                            >
                                                                <div class="flex items-center gap-3 min-w-0">
                                                                    <div 
                                                                        onClick={(e) => {
                                                                            e.stopPropagation();
                                                                            toggleDayCompleted(week.id, day.id);
                                                                        }}
                                                                        class={`w-5 h-5 rounded flex items-center justify-center border transition shrink-0 ${day.completed ? 'bg-emerald-500 border-emerald-400 text-slate-950' : 'border-slate-700 hover:border-slate-500'}`}
                                                                    >
                                                                        {day.completed && <i class="fa-solid fa-check text-xs"></i>}
                                                                    </div>
                                                                    <div class="min-w-0">
                                                                        <div class="flex items-center gap-1.5">
                                                                            <span class={`text-[11px] font-bold ${day.completed ? 'text-emerald-400' : 'text-slate-300'}`}>{day.name}</span>
                                                                            {day.completed && <span class="text-[9px] bg-emerald-500/10 text-emerald-400 px-1 rounded">완료</span>}
                                                                        </div>
                                                                        <p class={`text-xs mt-0.5 truncate ${day.completed ? 'line-through text-slate-500' : 'text-slate-400'}`}>{day.title}</p>
                                                                    </div>
                                                                </div>
                                                                <div class="flex items-center text-slate-500">
                                                                    <i class="fa-solid fa-chevron-right text-[10px]"></i>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        );
                                    })}
                            </div>
                        </div>

                        {/* Right: Detailed Workarea for selected Day */}
                        <div class="w-full md:w-[420px] bg-slate-900/60 p-5 flex flex-col h-full overflow-y-auto custom-scrollbar">
                            {currentSelectedDay ? (
                                <div class="flex flex-col h-full space-y-4">
                                    {/* Workarea Header */}
                                    <div class="border-b border-slate-800 pb-4">
                                        <div class="flex justify-between items-start">
                                            <div>
                                                <span class="text-[10px] uppercase font-bold text-emerald-400 bg-emerald-400/10 px-2 py-0.5 rounded">수강 상세 정보</span>
                                                <h2 class="text-base font-bold text-slate-100 mt-2">{currentSelectedDay.name}</h2>
                                                <p class="text-xs text-indigo-400 font-semibold mt-0.5">{currentSelectedDay.title}</p>
                                            </div>
                                            <button 
                                                onClick={() => toggleDayCompleted(selectedWeek, selectedDayId)}
                                                class={`px-3 py-1.5 rounded-lg text-xs font-bold flex items-center gap-1.5 transition ${currentSelectedDay.completed ? 'bg-emerald-500 hover:bg-emerald-600 text-slate-950' : 'bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700'}`}
                                            >
                                                <i class={`fa-solid ${currentSelectedDay.completed ? 'fa-check-double' : 'fa-check'}`}></i>
                                                {currentSelectedDay.completed ? '공부 완료' : '완료 체크'}
                                            </button>
                                        </div>
                                    </div>

                                    {/* Checklist section */}
                                    <div class="space-y-2">
                                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider font-semibold">🎯 오늘 반드시 학습할 빈출 테마</h3>
                                        <p class="text-[11px] text-slate-500">손목 보호를 위해 아래 개념들을 교재에서 찾아 <b class="text-indigo-400">눈으로 3초 이상 응시</b>하며 공식을 외우세요.</p>
                                        <div class="bg-slate-950/40 rounded-xl p-3 border border-slate-800/80 space-y-2">
                                            {currentSelectedDay.topics.map((topic, i) => (
                                                <div key={i} class="flex items-start gap-2.5 py-1 text-xs">
                                                    <span class="text-indigo-500 mt-0.5"><i class="fa-solid fa-circle-dot text-[9px]"></i></span>
                                                    <span class="text-slate-200 font-medium leading-relaxed">{topic}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 3중 누적 복습 실천 약속 */}
                                    <div class="p-3 bg-gradient-to-br from-indigo-950/20 to-slate-900 border border-indigo-900/40 rounded-xl">
                                        <h4 class="text-xs font-bold text-indigo-400 mb-1.5"><i class="fa-solid fa-lightbulb mr-1.5"></i>오늘 실천할 핵심 누적 복습</h4>
                                        <div class="space-y-1.5 text-[11px] text-slate-400">
                                            <div class="flex items-center gap-1.5">
                                                <input type="checkbox" id="rev-morning" class="rounded bg-slate-800 border-slate-700 text-indigo-500 focus:ring-0 cursor-pointer" />
                                                <label htmlFor="rev-morning" class="cursor-pointer select-none">아침 10분: 어제 봤던 공식들 눈도장 찍기 완료</label>
                                            </div>
                                            <div class="flex items-center gap-1.5">
                                                <input type="checkbox" id="rev-friday" class="rounded bg-slate-800 border-slate-700 text-indigo-500 focus:ring-0 cursor-pointer" />
                                                <label htmlFor="rev-friday" class="cursor-pointer select-none">금요일: 이번 주 진도 전체를 형광펜 중심 속독하기</label>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Today's Scratch Notes */}
                                    <div class="flex-grow flex flex-col space-y-1.5">
                                        <label class="text-xs font-bold text-slate-400">📝 오늘 한 줄 요약 및 취약 포인트 메모</label>
                                        <textarea 
                                            value={currentSelectedDay.notes}
                                            onChange={(e) => handleSaveDayNotes(selectedWeek, selectedDayId, e.target.value)}
                                            placeholder="예: 3상 평형 V결선시 공급용량 Pv = sqrt(3) * P1. 이 공식은 매 회 기출되니 무조건 외워둘 것!"
                                            class="w-full flex-grow bg-slate-950/40 border border-slate-800 rounded-lg p-3 text-xs text-slate-100 focus:outline-none focus:border-indigo-500 font-mono resize-none h-32 md:h-auto"
                                        ></textarea>
                                        <div class="text-right text-[10px] text-slate-500">
                                            자동 입력 연동 (입력 시 해당 일차에 자동 귀속됩니다)
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div class="flex flex-col items-center justify-center h-full text-slate-500 text-center">
                                    <i class="fa-regular fa-folder-open text-3xl mb-2"></i>
                                    <p class="text-xs">왼쪽 계획표에서 학습할 주차와 일차를 먼저 선택해 주세요.</p>
                                </div>
                            )}
                        </div>

                    </div>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
